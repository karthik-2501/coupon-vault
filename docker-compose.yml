services:
  postgres:
    image: postgres:16-alpine
    container_name: coupon-vault-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coupon_vault
    ports:
      - "5432:5432"
    volumes:
      - coupon_vault_pg:/var/lib/postgresql/data

volumes:
  coupon_vault_pg:
