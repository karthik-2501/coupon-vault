# No Docker / PostgreSQL required — embedded H2 (data lost when app stops)
spring.datasource.url=jdbc:h2:mem:couponvault;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# H2 web console disabled by default (Spring Security would need extra rules to use it)
spring.h2.console.enabled=false
