spring.application.name=coupon-vault-backend
server.port=8080

# Neon PostgreSQL (defaults below). Override with NEON_* env vars or backend/.env — see backend/.env.example
spring.datasource.url=${NEON_DATABASE_URL:jdbc:postgresql://ep-steep-art-anikcv4u-pooler.c-6.us-east-1.aws.neon.tech:5432/neondb?sslmode=require&channel_binding=require}
spring.datasource.username=${NEON_DATABASE_USERNAME:neondb_owner}
spring.datasource.password=${NEON_DATABASE_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration-ms=86400000
